name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: "1.0.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Generate app icons
        run: python scripts/generate_app_icons.py

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TOPDFAnnotator/TOPDFAnnotator.exe")) {
            throw "TOPDFAnnotator.exe not found"
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packaging/output | Out-Null
          Compress-Archive -Path dist/TOPDFAnnotator/* `
            -DestinationPath "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip" `
            -Force

      - name: Build Windows installer
        uses: amake/innosetup-action@v1.2.0
        with:
          path: packaging/windows/installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip
            packaging/output/TOPDFAnnotator-Setup-${{ env.APP_VERSION }}-win64.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Generate app icons
        run: python scripts/generate_app_icons.py

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        run: test -d dist/TOPDFAnnotator.app

      - name: Create DMG
        run: |
          mkdir -p packaging/output
          STAGING="packaging/output/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R dist/TOPDFAnnotator.app "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create -volname "TO PDF 批注工具" \
            -srcfolder "$STAGING" -ov -format UDZO \
            "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: release/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/*
            release/macos/*
          generate_release_notes: true
