name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: Build targets
        required: true
        default: mac-only
        type: choice
        options:
          - all
          - mac-only
          - windows-only

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  CSC_IDENTITY: "-"

jobs:
  build-electron-windows:
    if: github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'windows-only'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Build Windows Electron installer
        shell: pwsh
        working-directory: electron
        run: |
          npm ci
          npm run dist

      - name: Collect Windows artifact
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path packaging/output -Filter "*Setup*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) { throw "NSIS installer not found under packaging/output" }
          Copy-Item $setup.FullName "packaging/output/TOPDFAnnotator-Setup-${{ env.APP_VERSION }}-win64.exe" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: packaging/output/TOPDFAnnotator-Setup-${{ env.APP_VERSION }}-win64.exe
          if-no-files-found: error

  build-electron-macos-arm64:
    if: github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'mac-only'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        run: |
          grep -v '^crewai\|^-r' requirements.txt > /tmp/requirements-mac.txt
          echo "pyinstaller>=6.3.0" >> /tmp/requirements-mac.txt
          python -m pip install --upgrade pip
          python -m pip install -r /tmp/requirements-mac.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Build macOS arm64 Electron DMG
        working-directory: electron
        run: |
          npm ci
          npm run icons
          npm run prepare-vendor
          npm run build-backend
          npx electron-builder --mac dmg --arm64 --publish never

      - name: Collect macOS arm64 artifact
        run: |
          dmg="$(find packaging/output -maxdepth 1 -name '*.dmg' -type f | head -1)"
          test -n "$dmg" || { echo "DMG not found"; exit 1; }
          cp "$dmg" "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac-arm64.dmg"

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-installers
          path: packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac-arm64.dmg
          if-no-files-found: error

  build-electron-macos-x64:
    if: github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'mac-only'
    runs-on: macos-14
    env:
      PYINSTALLER_TARGET_ARCH: x86_64
      _PY_X86_64: /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install x86_64 Python 3.11
        run: |
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          curl -fsSL -o /tmp/python.pkg "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          file "$_PY_X86_64"
          arch -x86_64 "$_PY_X86_64" -c "import platform,struct; print(f'machine={platform.machine()} ptr={struct.calcsize(\"P\")*8}bit')"

      - name: Install Python build dependencies (x86_64)
        run: |
          grep -v '^crewai\|^-r' requirements.txt > /tmp/requirements-mac.txt
          echo "pyinstaller>=6.3.0" >> /tmp/requirements-mac.txt
          arch -x86_64 "$_PY_X86_64" -m pip install --upgrade pip
          arch -x86_64 "$_PY_X86_64" -m pip install -r /tmp/requirements-mac.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Build macOS x64 Electron DMG
        working-directory: electron
        env:
          TOPDF_PYTHON: /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11
        run: |
          npm ci
          arch -x86_64 "$_PY_X86_64" ../scripts/generate_app_icons.py
          npm run prepare-vendor
          npm run build-backend
          npx electron-builder --mac dmg --x64 --publish never

      - name: Collect macOS x64 artifact
        run: |
          dmg="$(find packaging/output -maxdepth 1 -name '*.dmg' -type f | head -1)"
          test -n "$dmg" || { echo "DMG not found"; exit 1; }
          cp "$dmg" "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac-x64.dmg"

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-installers
          path: packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac-x64.dmg
          if-no-files-found: error

  release:
    needs: [build-electron-windows, build-electron-macos-arm64, build-electron-macos-x64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-installers
          path: release/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-installers
          path: release/macos-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TO PDF 批注工具 ${{ github.ref_name }}
          files: |
            release/windows/*
            release/macos-arm64/*
            release/macos-x64/*
          generate_release_notes: true
