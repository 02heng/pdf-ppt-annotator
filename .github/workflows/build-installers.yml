name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Generate app icons
        run: python scripts/generate_app_icons.py

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TOPDFAnnotator/TOPDFAnnotator.exe")) {
            throw "TOPDFAnnotator.exe not found"
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packaging/output | Out-Null
          Compress-Archive -Path dist/TOPDFAnnotator/* `
            -DestinationPath "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip" `
            -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno Setup install" }
          & $iscc "/DMyAppVersion=$env:APP_VERSION" packaging/windows/installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip
            packaging/output/TOPDFAnnotator-Setup-${{ env.APP_VERSION }}-win64.exe
          if-no-files-found: error

  build-macos:
    # macos-13 = Intel runner，构建 x86_64 版本（Apple Silicon 通过 Rosetta 2 兼容）
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Verify Python architecture
        run: |
          python3 -c "import platform; print(f'Architecture: {platform.machine()}')"
          python3 -c "import struct; print(f'Pointer size: {struct.calcsize(\"P\") * 8}-bit')"

      - name: Install build dependencies
        run: python3 -m pip install -r requirements-build.txt

      - name: Generate app icons
        run: python3 scripts/generate_app_icons.py

      - name: Build Universal Binary (Intel + Apple Silicon)
        run: python3 -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        run: |
          test -d dist/TOPDFAnnotator.app || { echo "TOPDFAnnotator.app not found"; exit 1; }
          file dist/TOPDFAnnotator.app/Contents/MacOS/TOPDFAnnotator
          lipo -info dist/TOPDFAnnotator.app/Contents/MacOS/TOPDFAnnotator || true

      - name: Create DMG
        run: |
          mkdir -p packaging/output
          STAGING="packaging/output/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R dist/TOPDFAnnotator.app "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create -volname "TO PDF 批注工具" \
            -srcfolder "$STAGING" -ov -format UDZO \
            "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: release/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TO PDF 批注工具 ${{ github.ref_name }}
          files: |
            release/windows/*
            release/macos/*
          generate_release_notes: true
