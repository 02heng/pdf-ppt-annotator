name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Generate app icons
        run: python scripts/generate_app_icons.py

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TOPDFAnnotator/TOPDFAnnotator.exe")) {
            throw "TOPDFAnnotator.exe not found"
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packaging/output | Out-Null
          Compress-Archive -Path dist/TOPDFAnnotator/* `
            -DestinationPath "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip" `
            -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno Setup install" }
          & $iscc "/DMyAppVersion=$env:APP_VERSION" packaging/windows/installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-win64-portable.zip
            packaging/output/TOPDFAnnotator-Setup-${{ env.APP_VERSION }}-win64.exe
          if-no-files-found: error

  build-macos:
    # macos-14 = Apple Silicon runner，通过 Rosetta 2 构建 x86_64 (Intel) 版本
    runs-on: macos-14
    env:
      # 全局设置：所有命令都在 Rosetta 2 (x86_64) 下运行
      ARCHFLAGS: "-arch x86_64"
      _PY_X86_64: "/Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="$(tr -d '\r\n' < VERSION)"
          fi
          echo "APP_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install x86_64 Python 3.11
        run: |
          # 安装 Rosetta 2
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          # 下载 python.org 安装包（universal2，包含 x86_64 + arm64）
          curl -fsSL -o /tmp/python.pkg "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          # 验证 x86_64 可用
          file "$_PY_X86_64"
          arch -x86_64 "$_PY_X86_64" -c "import platform,struct; print(f'machine={platform.machine()} ptr={struct.calcsize(\"P\")*8}bit')"

      - name: Install dependencies (x86_64 via Rosetta 2)
        run: |
          # 所有 pip 命令都通过 arch -x86_64 在 Rosetta 2 下运行
          # 这样 pip 会自动检测 x86_64 平台并下载对应的 wheel
          arch -x86_64 "$_PY_X86_64" -m pip install --upgrade pip
          arch -x86_64 "$_PY_X86_64" -m pip install -r requirements-build.txt
          arch -x86_64 "$_PY_X86_64" -m pip install -r requirements.txt

      - name: Generate app icons
        run: arch -x86_64 "$_PY_X86_64" scripts/generate_app_icons.py

      - name: Build x86_64 binary (Intel Mac)
        run: arch -x86_64 "$_PY_X86_64" -m PyInstaller --noconfirm --clean packaging/TOPDFAnnotator.spec

      - name: Verify build
        run: |
          test -d dist/TOPDFAnnotator.app || { echo "TOPDFAnnotator.app not found"; exit 1; }
          file dist/TOPDFAnnotator.app/Contents/MacOS/TOPDFAnnotator
          lipo -info dist/TOPDFAnnotator.app/Contents/MacOS/TOPDFAnnotator || true

      - name: Create DMG
        run: |
          mkdir -p packaging/output
          STAGING="packaging/output/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R dist/TOPDFAnnotator.app "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create -volname "TO PDF 批注工具" \
            -srcfolder "$STAGING" -ov -format UDZO \
            "packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: packaging/output/TOPDFAnnotator-${{ env.APP_VERSION }}-mac.dmg
          if-no-files-found: error

  release:
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: release/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TO PDF 批注工具 ${{ github.ref_name }}
          files: |
            release/macos/*
          generate_release_notes: true
